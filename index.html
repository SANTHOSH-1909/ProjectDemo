<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Shop | E-Commerce</title>
    <!-- Simple CSS for layout -->
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">CodeAlpha<span>Tech</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="login.html">Login</a></li>
            <li class="cart-icon">
                <a href="cart.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <h1>Upgrade Your Gear</h1>
        <p>Discover the latest in tech and innovation.</p>
    </header>

    <!-- Main Product Grid -->
    <main class="container">
        <h2>Featured Products</h2>
        <div class="product-grid" id="product-list">
            <!-- Products will be injected here by JavaScript/Backend -->
            
            <!-- Static Example Item -->
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product Name">
                <h3>Smartphone X</h3>
                <p class="price">$799.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product Name">
                <h3>Wireless Headphones</h3>
                <p class="price">$199.00</p>
                <button class="add-btn">Add to Cart</button>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CodeAlpha. Visit <a href="http://www.codealpha.tech">www.codealpha.tech</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
